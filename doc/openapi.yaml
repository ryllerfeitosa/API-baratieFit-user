components:
  schemas:
    Tipo Refeição:
      required:
        - id
        - nome
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string

    Publico Alvo:
      required:
        - id
        - nome
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string

    Restrição:
      required:
        - id
        - nome
        - descricao
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: string

    Categoria Alimento:
      required:
        - id
        - nome
        - descricao
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: string

    Enquadramento:
      required:
        - id
        - nome
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string

    Nivel Acesso:
      required:
        - id
        - nivel
      type: object
      properties:
        id:
          type: integer
        nivel:
          type: string

    Refeição:
      required:
        - id
        - nome
        - tipoRefeicao
        - publicoAlvo
        - enquadramento
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        tipoRefeicao:
          $ref: '#/components/schemas/Tipo Refeição'
        publicoAlvo:
          $ref: '#/components/schemas/Publico Alvo'
        enquadramento:
          $ref: '#/components/schemas/Enquadramento'

      Alimento:
        required:
          - id
          - nome
          - categoriaAlimento
        type: object
        properties:
          id:
            type: integer
          nome:
            type: string
          categoriaAlimento:
            $ref: '#/components/schemas/Categoria Alimento'
      Adm:
        required:
          - id
          - nome
          - email
          - senha
          - nivelAcesso
        type: object
        properties:
          id:
            type: integer
          nome:
            type: string
          email:
            type: string
          senha:
            type: string
          nivelAcesso:
            $ref: '#/components/schemas/Nivel Acesso'

      Refeição Alimento:
        required:
          - id
          - refeicao
          - alimento
        type: object
        properties:
          id:
            type: integer
          refeicao:
            $ref: '#/components/schemas/Refeição'
          alimento:
            $ref: '#/components/schemas/Alimento'

      Refeição Restrição:
        required:
          - id
          - refeicao
          - restricao
        type: object
        properties:
          id:
            type: integer
          refeicao:
            $ref: '#/components/schemas/Refeição'
          restricao:
            $ref: '#/components/schemas/Restrição'

      Help:
        required:
          - id
          - rota
          - descricao
        type: object
        properties:
          id:
            type: integer
          rota:
            type: string
          descricao:
            type: string

  requestBodies:
    Filme:
      description: Objeto que deve ser enviado no Body das requisicoes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Filme'
